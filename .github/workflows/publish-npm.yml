name: Publish to npm

# TAG-triggered (matches the serpex SDK repos). Push a `v<version>` tag to publish.
# NO auto-bump: set package.json's version yourself, commit, then tag + push the tag.
# A normal push to main does NOT publish anymore.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
